# Netlify build config — frontend only (the Python API is hosted separately).
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route serves index.html (state-based routing, no 404s).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_BASE_URL (and optionally VITE_DEMO_MODE) in the Netlify
# dashboard → Site settings → Environment variables.
